<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Exam Performance Predictor</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #07080f;
      font-family: 'DM Sans', sans-serif;
      color: #e8eaf6;
      background-image:
        radial-gradient(ellipse 60% 50% at 20% 30%, rgba(79,142,255,.12) 0%, transparent 70%),
        radial-gradient(ellipse 50% 50% at 80% 70%, rgba(162,89,255,.10) 0%, transparent 70%);
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .badge {
      display: inline-block;
      font-size: .72rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #00e5c3;
      border: 1px solid rgba(0,229,195,.3);
      padding: .3rem .9rem;
      border-radius: 99px;
      margin-bottom: 1.8rem;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 800;
      letter-spacing: -.03em;
      line-height: 1.1;
      margin-bottom: 1rem;
    }

    h1 span {
      background: linear-gradient(135deg, #4f8eff, #a259ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-size: 1rem;
      color: #7b82a8;
      margin-bottom: 2.5rem;
      line-height: 1.7;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .9rem 2.2rem;
      background: linear-gradient(135deg, #4f8eff, #a259ff);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: .95rem;
      border-radius: 12px;
      text-decoration: none;
      box-shadow: 0 4px 24px rgba(79,142,255,.35);
      transition: transform .25s ease, box-shadow .25s ease, filter .25s ease;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(79,142,255,.5);
      filter: brightness(1.1);
    }

    .arrow { transition: transform .25s; }
    .btn:hover .arrow { transform: translateX(4px); }
  </style>
</head>
<body>
  <div class="container">
    <span class="badge">ML Powered</span>
    <h1>Student Exam<br><span>Performance Predictor</span></h1>
    <p>Predict a student's Math score using machine learning.</p>
    <a href="{{ url_for('predict_datapoint') }}" class="btn">
      Start Prediction <span class="arrow">→</span>
    </a>
  </div>
</body>
</html>
